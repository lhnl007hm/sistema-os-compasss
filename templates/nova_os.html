<!doctype html>
<html>
  <head>
    <title>Nova OS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h4>📝 Nova Ordem de Serviço</h4>
            </div>
            <div class="card-body">
              <form method="POST">
                <div class="mb-3">
                  <label>Título:</label>
                  <input
                    type="text"
                    name="titulo"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Descrição:</label>
                  <textarea
                    name="descricao"
                    class="form-control"
                    rows="3"
                    required
                  ></textarea>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label>Sistema:</label>
                    <select name="sistema" class="form-control" required>
                      <option value="">Selecione...</option>
                      <option>SDAI</option>
                      <option>SAI</option>
                      <option>SCA</option>
                      <option>BMS</option>
                      <option>TELECOM</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Atividade:</label>
                    <select name="atividade" class="form-control" required>
                      <option value="">Selecione...</option>
                      <option>Manutenção Preventiva</option>
                      <option>Manutenção Corretiva</option>
                      <option>Acompanhamento</option>
                      <option>Outros</option>
                    </select>
                  </div>
                </div>

                <div class="mb-3">
                  <label>Status:</label>
                  <select name="status" class="form-control" required>
                    <option>À Fazer</option>
                    <option>Em Andamento</option>
                    <option>Concluído</option>
                  </select>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label>Data Início:</label>
                    <input
                      type="date"
                      name="data_inicio"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Data Fim:</label>
                    <input
                      type="date"
                      name="data_fim"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <button type="submit" class="btn btn-success w-100">
                  Criar OS
                </button>
                <a href="/dashboard" class="btn btn-secondary w-100 mt-2"
                  >Cancelar</a
                >
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
