<!doctype html>
<html>
  <head>
    <title>Métricas - Sistema OS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand"
          >📊 Métricas - {{ current_user.unidade }}</span
        >
        <div>
          <a href="/dashboard" class="btn btn-primary">📋 Dashboard</a>
          <a href="/logout" class="btn btn-danger">Sair</a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h2>Análise de Ordens de Serviço</h2>

      <!-- Filtro por Mês -->
      <!-- Filtro por Mês -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Filtrar por Período</h5>
          <div class="row">
            <div class="col-md-4">
              <label>Mês Início:</label>
              <input
                type="month"
                id="mes_inicio"
                class="form-control"
                value="2024-01"
              />
            </div>
            <div class="col-md-4">
              <label>Mês Fim:</label>
              <input
                type="month"
                id="mes_fim"
                class="form-control"
                value="2024-12"
              />
            </div>
            <div class="col-md-4">
              <label>&nbsp;</label>
              <button
                onclick="atualizarGraficos()"
                class="btn btn-primary w-100"
              >
                Filtrar
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Gráfico 1: Status -->
        <div class="col-md-6 mb-4">
          <div class="card">
            <div class="card-header bg-primary text-white">
              <h5>OS por Status</h5>
            </div>
            <div class="card-body">
              <canvas id="graficoStatus"></canvas>
            </div>
          </div>
        </div>

        <!-- Gráfico 2: Sistema -->
        <div class="col-md-6 mb-4">
          <div class="card">
            <div class="card-header bg-success text-white">
              <h5>OS por Sistema</h5>
            </div>
            <div class="card-body">
              <canvas id="graficoSistema"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Gráfico 3: Evolução Mensal -->
        <div class="col-md-12">
          <div class="card">
            <div class="card-header bg-info text-white">
              <h5>Evolução Mensal de OS</h5>
            </div>
            <div class="card-body">
              <canvas id="graficoMensal"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let graficoStatus, graficoSistema, graficoMensal;

      // Configuração inicial dos gráficos
      document.addEventListener("DOMContentLoaded", function () {
        const ctxStatus = document
          .getElementById("graficoStatus")
          .getContext("2d");
        const ctxSistema = document
          .getElementById("graficoSistema")
          .getContext("2d");
        const ctxMensal = document
          .getElementById("graficoMensal")
          .getContext("2d");

        graficoStatus = new Chart(ctxStatus, {
          type: "pie",
          data: {
            labels: ["À Fazer", "Em Andamento", "Concluído"],
            datasets: [
              {
                data: [0, 0, 0],
                backgroundColor: ["#ffc107", "#0d6efd", "#198754"],
              },
            ],
          },
        });

        graficoSistema = new Chart(ctxSistema, {
          type: "bar",
          data: {
            labels: ["SDAI", "SAI", "SCA", "BMS", "TELECOM"],
            datasets: [
              {
                label: "Quantidade de OS",
                data: [0, 0, 0, 0, 0],
                backgroundColor: "#0d6efd",
              },
            ],
          },
        });

        graficoMensal = new Chart(ctxMensal, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Total de OS",
                data: [],
                borderColor: "#198754",
                tension: 0.1,
              },
            ],
          },
        });

        atualizarGraficos();
      });

      async function atualizarGraficos() {
        try {
          const response = await fetch("/api/dados-metricas");
          const dados = await response.json();

          // Atualiza gráfico de Status
          graficoStatus.data.datasets[0].data = [
            dados.status["À Fazer"] || 0,
            dados.status["Em Andamento"] || 0,
            dados.status["Concluído"] || 0,
          ];
          graficoStatus.update();

          // Atualiza gráfico de Sistema
          const sistemas = ["SDAI", "SAI", "SCA", "BMS", "TELECOM"];
          graficoSistema.data.datasets[0].data = sistemas.map(
            (s) => dados.sistemas[s] || 0,
          );
          graficoSistema.update();

          // Atualiza gráfico Mensal
          graficoMensal.data.labels = dados.mensal.map((m) => m.mes);
          graficoMensal.data.datasets[0].data = dados.mensal.map(
            (m) => m.total,
          );
          graficoMensal.update();
        } catch (error) {
          console.error("Erro ao carregar métricas:", error);
        }
      }
    </script>
  </body>
</html>
