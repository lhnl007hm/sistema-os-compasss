<!doctype html>
<html>
  <head>
    <title>Editar OS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-warning">
              <h4>✏️ Editar OS: {{ os.numero_os }}</h4>
            </div>
            <div class="card-body">
              <form method="POST">
                <div class="mb-3">
                  <label>Título:</label>
                  <input
                    type="text"
                    name="titulo"
                    class="form-control"
                    value="{{ os.titulo }}"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label>Descrição:</label>
                  <textarea
                    name="descricao"
                    class="form-control"
                    rows="3"
                    required
                  >
{{ os.descricao }}</textarea
                  >
                </div>

                <div class="mb-3">
                  <label>Status:</label>
                  <select name="status" class="form-control" required>
                    <option {% if os.status="" ="À Fazer" %}selected{% endif %}>
                      À Fazer
                    </option>
                    <option
                      {%
                      if
                      os.status=""
                      ="Em Andamento"
                      %}selected{%
                      endif
                      %}
                    >
                      Em Andamento
                    </option>
                    <option
                      {%
                      if
                      os.status=""
                      ="Concluído"
                      %}selected{%
                      endif
                      %}
                    >
                      Concluído
                    </option>
                  </select>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label>Data Início:</label>
                    <input
                      type="date"
                      name="data_inicio"
                      class="form-control"
                      value="{{ os.data_inicio.strftime('%Y-%m-%d') }}"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Data Fim:</label>
                    <input
                      type="date"
                      name="data_fim"
                      class="form-control"
                      value="{{ os.data_fim.strftime('%Y-%m-%d') }}"
                      required
                    />
                  </div>
                </div>

                <div class="alert alert-info">
                  <strong>Sistema:</strong> {{ os.sistema }}<br />
                  <strong>Atividade:</strong> {{ os.atividade }}<br />
                  <strong>Unidade:</strong> {{ os.unidade }}<br />
                  <strong>Criado por:</strong> {{ os.criado_por }}
                </div>

                <button type="submit" class="btn btn-warning w-100">
                  Salvar Alterações
                </button>
                <a href="/dashboard" class="btn btn-secondary w-100 mt-2"
                  >Cancelar</a
                >
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
